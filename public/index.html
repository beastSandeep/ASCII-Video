<!doctype html>
<html>
  <head>
    <title>ASCII WebGL Converter</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script src="js/shaders.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      [x-cloak] { display: none !important; }
      .sub-settings {
        padding-left: 15px;
        border-left: 2px solid #444;
        margin-top: 10px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body x-data="appData()" x-init="init()">
    <div id="app">
      <div id="preview-container">
        <video id="video" playsinline style="display: none;"></video>
        <canvas id="gl" 
                :style="`transform: translate(${uiPan.x}px, ${uiPan.y}px) scale(${uiScale}); cursor: ${isDragging ? 'grabbing' : 'grab'}`"
        ></canvas>

        <!-- Video Controls Overlay -->
        <div id="video-controls" x-show="!isCamera && hasSource" x-transition>
          <button @click="stepFrame(-1)" class="control-btn" title="Frame Back">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" /></svg>
          </button>

          <button @click="togglePlay" class="control-btn" :title="running ? 'Pause' : 'Play'">
            <template x-if="!running">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
            </template>
            <template x-if="running">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M14,19H18V5H14M6,19H10V5H6V19Z" /></svg>
            </template>
          </button>

          <button @click="stepFrame(1)" class="control-btn" title="Frame Forward">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" /></svg>
          </button>

          <div class="progress-container">
            <input type="range" 
                   min="0" 
                   :max="duration || 0" 
                   step="0.01" 
                   :value="currentTime" 
                   @input="seek($event.target.value)"
                   class="progress-bar" />
          </div>

          <div class="time-display">
            <span x-text="formatTime(currentTime)"></span> / <span x-text="formatTime(duration)"></span>
          </div>

          <button @click="toggleLoop" class="control-btn" :style="settings.loop ? 'color: #3498db' : ''" title="Toggle Loop">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17,17H7V14L3,18L7,22V19H19V13H17M7,7H17V10L21,6L17,2V5H5V11H7V7Z" /></svg>
          </button>

          <button @click="toggleMute" class="control-btn">
            <template x-if="settings.muted || settings.volume == 0">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12,4L9.91,6.09L12,8.18M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.45 16.63,19.82 17.68,18.96L19.73,21L21,19.73L12,10.73M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.62,14.91 21,13.5 21,12C21,7.72 18,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,10.23 15.5,8.71 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12Z" /></svg>
            </template>
            <template x-if="!settings.muted && settings.volume > 0">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.03C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" /></svg>
            </template>
          </button>
        </div>
      </div>

      <div id="sidebar" x-cloak>
        <h1>ASCII Converter</h1>
        
        <details>
          <summary>Presets</summary>
          <div class="control-group">
            <div class="button-row">
              <button @click="savePreset()">Save Preset</button>
              <button @click="$refs.presetInput.click()">Load Preset</button>
            </div>
            <input type="file" x-ref="presetInput" @change="loadPreset($event)" accept=".json" style="display: none;" />
          </div>
        </details>

        <details open>
          <summary>Source & Playback</summary>
          <div class="control-group">
            <label class="custom-file-upload">
              <input type="file" @change="loadVideo($event)" accept="video/*" />
              <span class="file-btn">Choose Video File</span>
            </label>
          </div>
          <div class="control-group">
            <div class="button-row">
              <button @click="togglePlay" x-text="running ? 'Pause' : 'Play'"></button>
              <button @click="useWebcam">Use Webcam</button>
            </div>
          </div>
          <div class="control-group inline">
            <label>Show Original Video</label>
            <input type="checkbox" x-model="settings.showOriginal" />
          </div>
          <div class="control-group">
            <label>Preview Volume: <span x-text="Math.round(settings.volume * 100)"></span>%</label>
            <div class="button-row">
              <button @click="toggleMute" x-text="settings.muted ? 'Unmute' : 'Mute'" style="flex: 0 0 80px;"></button>
              <input type="range" x-model="settings.volume" @input="updateVolume" min="0" max="1" step="0.01" style="flex: 1;" />
            </div>
          </div>
        </details>

        <details open>
          <summary>ASCII Settings</summary>
          <div class="control-group">
            <label>Effect Style</label>
            <select x-model="settings.style">
              <option value="0">ASCII Art</option>
              <option value="1">Halftone Dots</option>
              <option value="2">Matrix Rain</option>
            </select>
          </div>
          <div class="control-group" x-show="settings.style == 0">
            <label>Algorithm Variation</label>
            <select x-model="settings.asciiVariation">
              <option value="0">Standard (Luminance)</option>
              <option value="1">Edge-Enhanced (Sobel)</option>
              <option value="2">Directional Mapping</option>
              <option value="3">Sharp Detailed</option>
            </select>
            
            <!-- Variation Tweaks -->
            <div x-show="settings.asciiVariation == 1" class="sub-settings">
              <div class="control-group">
                <label>Edge Strength: <span x-text="settings.edgeStrength"></span></label>
                <input type="range" x-model="settings.edgeStrength" min="0" max="5" step="0.1" />
              </div>
              <div class="control-group">
                <label>Edge Threshold: <span x-text="settings.edgeThreshold"></span></label>
                <input type="range" x-model="settings.edgeThreshold" min="0" max="1" step="0.01" />
              </div>
            </div>
            
            <div x-show="settings.asciiVariation == 2" class="sub-settings">
              <div class="control-group">
                <label>Directional Threshold: <span x-text="settings.dirEdgeThreshold"></span></label>
                <input type="range" x-model="settings.dirEdgeThreshold" min="0" max="1" step="0.01" />
              </div>
            </div>
            
            <div x-show="settings.asciiVariation == 3" class="sub-settings">
              <p style="font-size: 0.75rem; color: #888;">(Uses 'Sharpness' slider in Adjustments)</p>
            </div>
          </div>
          <div class="control-group" x-show="settings.style == 0">
            <label>Character Set</label>
            <select x-model="settings.charset" @change="updateCharset">
              <option value="STANDARD">Standard</option>
              <option value="MINIMAL">Minimal</option>
              <option value="BLOCKS">Blocks</option>
              <option value="BINARY">Binary</option>
              <option value="NUMERIC">Numeric</option>
              <option value="SIMPLE">Simple</option>
              <option value="EXTENDED">Extended (High Detail)</option>
              <option value="KATAKANA">Katakana (Japanese)</option>
              <option value="BRAILLE">Braille (Spatial Detail)</option>
              <option value="GEOMETRIC">Geometric Shapes</option>
              <option value="ASCII_SHARP">ASCII Sharp (Balanced)</option>
            </select>
          </div>
          <div class="control-group">
            <label>Character Size: <span x-text="settings.charSize"></span>px</label>
            <input type="range" x-model="settings.charSize" min="4" max="64" step="1" />
          </div>
          <div class="control-group">
            <label>Char Spacing: <span x-text="settings.spacing"></span></label>
            <input type="range" x-model="settings.spacing" min="0.5" max="2.0" step="0.05" />
          </div>
        </details>

        <details>
          <summary>UI Preview View</summary>
          <div class="control-group">
            <label>UI Zoom: <span x-text="uiScale.toFixed(2)"></span>x</label>
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 8px;">(Scroll on canvas to zoom, Drag to pan. Does not affect export.)</p>
            <button @click="uiScale=1.0; uiPan={x:0, y:0};">Reset UI View</button>
          </div>
        </details>

        <details>
          <summary>Adjustments</summary>
          <div class="control-group">
            <label>Brightness: <span x-text="settings.brightness"></span></label>
            <input type="range" x-model="settings.brightness" min="0" max="2" step="0.01" />
          </div>
          <div class="control-group">
            <label>Contrast: <span x-text="settings.contrast"></span></label>
            <input type="range" x-model="settings.contrast" min="0" max="2" step="0.01" />
          </div>
          <div class="control-group">
            <label>Saturation: <span x-text="settings.saturation"></span></label>
            <input type="range" x-model="settings.saturation" min="0" max="3" step="0.01" />
          </div>
          <div class="control-group">
            <label>Sharpness: <span x-text="settings.sharpness"></span></label>
            <input type="range" x-model="settings.sharpness" min="0" max="2" step="0.01" />
          </div>
          <div class="control-group">
            <label>Gamma: <span x-text="settings.gamma"></span></label>
            <input type="range" x-model="settings.gamma" min="0.1" max="3.0" step="0.05" />
          </div>
          <div class="control-group">
            <label>Temporal Stability: <span x-text="settings.stability"></span></label>
            <input type="range" x-model="settings.stability" min="0" max="1" step="0.01" />
          </div>
          <div class="control-group inline">
            <label>Invert Effect</label>
            <input type="checkbox" x-model="settings.invert" />
          </div>
        </details>

        <details>
          <summary>Color</summary>
          <div class="control-group inline">
            <label>Use Original Color</label>
            <input type="checkbox" x-model="settings.colorMode" />
          </div>
          <div class="control-group inline">
            <label>Background Color</label>
            <input type="color" x-model="settings.bgColor" />
          </div>
        </details>

        <details>
          <summary>Post-Processing</summary>
          <!-- Bloom -->
          <div class="control-group inline">
            <label>Bloom</label>
            <input type="checkbox" x-model="settings.bloom" />
          </div>
          <div x-show="settings.bloom" class="sub-settings">
            <div class="control-group">
              <label>Threshold: <span x-text="settings.bloomThreshold"></span></label>
              <input type="range" x-model="settings.bloomThreshold" min="0" max="1" step="0.01" />
            </div>
            <div class="control-group">
              <label>Soft Threshold: <span x-text="settings.bloomSoft"></span></label>
              <input type="range" x-model="settings.bloomSoft" min="0" max="1" step="0.01" />
            </div>
            <div class="control-group">
              <label>Intensity: <span x-text="settings.bloomIntensity"></span></label>
              <input type="range" x-model="settings.bloomIntensity" min="0" max="3" step="0.01" />
            </div>
            <div class="control-group">
              <label>Radius: <span x-text="settings.bloomRadius"></span></label>
              <input type="range" x-model="settings.bloomRadius" min="1" max="20" step="1" />
            </div>
          </div>

          <!-- Grain -->
          <div class="control-group inline">
            <label>Grain</label>
            <input type="checkbox" x-model="settings.grain" />
          </div>
          <div x-show="settings.grain" class="sub-settings">
            <div class="control-group">
              <label>Intensity: <span x-text="settings.grainIntensity"></span></label>
              <input type="range" x-model="settings.grainIntensity" min="0" max="1" step="0.01" />
            </div>
            <div class="control-group">
              <label>Size: <span x-text="settings.grainSize"></span></label>
              <input type="range" x-model="settings.grainSize" min="0" max="10" step="0.1" />
            </div>
            <div class="control-group">
              <label>Speed: <span x-text="settings.grainSpeed"></span></label>
              <input type="range" x-model="settings.grainSpeed" min="0" max="5" step="0.05" />
            </div>
          </div>

          <!-- Chromatic -->
          <div class="control-group inline">
            <label>Chromatic Aberration</label>
            <input type="checkbox" x-model="settings.chromatic" />
          </div>
          <div x-show="settings.chromatic" class="sub-settings">
            <div class="control-group">
              <label>Offset: <span x-text="settings.chromaticOffset"></span></label>
              <input type="range" x-model="settings.chromaticOffset" min="0" max="0.05" step="0.001" />
            </div>
          </div>

          <!-- Scanlines -->
          <div class="control-group inline">
            <label>Scanlines</label>
            <input type="checkbox" x-model="settings.scanlines" />
          </div>
          <div x-show="settings.scanlines" class="sub-settings">
            <div class="control-group">
              <label>Opacity: <span x-text="settings.scanlineOpacity"></span></label>
              <input type="range" x-model="settings.scanlineOpacity" min="0" max="1" step="0.01" />
            </div>
            <div class="control-group">
              <label>Spacing: <span x-text="settings.scanlineSpacing"></span></label>
              <input type="range" x-model="settings.scanlineSpacing" min="1" max="10" step="0.1" />
            </div>
          </div>

          <!-- Vignette -->
          <div class="control-group inline">
            <label>Vignette</label>
            <input type="checkbox" x-model="settings.vignette" />
          </div>
          <div x-show="settings.vignette" class="sub-settings">
            <div class="control-group">
              <label>Intensity: <span x-text="settings.vignetteIntensity"></span></label>
              <input type="range" x-model="settings.vignetteIntensity" min="0" max="1" step="0.01" />
            </div>
            <div class="control-group">
              <label>Radius: <span x-text="settings.vignetteRadius"></span></label>
              <input type="range" x-model="settings.vignetteRadius" min="0" max="1" step="0.01" />
            </div>
          </div>

          <!-- CRT -->
          <div class="control-group inline">
            <label>CRT Curve</label>
            <input type="checkbox" x-model="settings.crtCurve" />
          </div>
          <div x-show="settings.crtCurve" class="sub-settings">
            <div class="control-group">
              <label>Amount: <span x-text="settings.crtAmount"></span></label>
              <input type="range" x-model="settings.crtAmount" min="0" max="0.5" step="0.01" />
            </div>
          </div>

          <!-- Phosphor -->
          <div class="control-group inline">
            <label>Phosphor Glow</label>
            <input type="checkbox" x-model="settings.phosphor" />
          </div>
          <div x-show="settings.phosphor" class="sub-settings">
            <div class="control-group">
              <label>Color</label>
              <select x-model="settings.phosphorColor">
                <option value="Green">Green</option>
                <option value="Amber">Amber</option>
                <option value="Blue">Blue</option>
                <option value="White">White</option>
              </select>
            </div>
          </div>

          <!-- Audio Visualizer -->
          <div class="control-group inline">
            <label>Audio Visualizer</label>
            <input type="checkbox" x-model="settings.showVisualizer" />
          </div>
          <div x-show="settings.showVisualizer" class="sub-settings">
            <div class="control-group">
              <label>Intensity: <span x-text="settings.visualizerIntensity"></span></label>
              <input type="range" x-model="settings.visualizerIntensity" min="0.1" max="5" step="0.1" />
            </div>
          </div>
        </details>

        <details>
          <summary>Snapshot & Export</summary>
          <div class="control-group">
            <label>Snapshot Format</label>
            <div class="button-row">
              <select x-model="snapshotFormat" style="flex: 1;">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPEG</option>
              </select>
              <button @click="takeSnapshot" style="flex: 2;">Take Snapshot</button>
            </div>
          </div>
          <div class="control-group inline">
            <label>Include Audio</label>
            <input type="checkbox" x-model="settings.recordAudio" />
          </div>
          <hr />
          <div class="control-group">
            <label>Target FPS</label>
            <input type="number" x-model="settings.fps" min="1" max="120" />
          </div>
          <div class="control-group">
            <button @click="exportVideo" class="primary" :disabled="isExporting" x-text="isExporting ? 'Exporting...' : 'Export MP4'"></button>
            <button @click="stopRecording" x-show="isExporting && isCamera" style="margin-top: 8px; background: #e74c3c;">Stop Recording</button>
            <div x-show="isExporting" class="status-box">
              <progress :value="renderProgress" max="100"></progress>
              <p x-text="renderMsg"></p>
            </div>
          </div>
        </details>
      </div>
    </div>

    <script src="js/atlas.js"></script>
    <script src="js/gl.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
